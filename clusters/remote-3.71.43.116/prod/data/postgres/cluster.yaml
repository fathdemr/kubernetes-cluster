apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: data
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  bootstrap:
    initdb:
      database:
      owner:
      secret:
        name:

  storage:
    size: 20Gi
    storageClass: longhorn

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  monitoring:
    enablePodMonitor: false

  # ---- Yeni uygulama eklerken sadece buraya ekleme yapacaksınız ----
  managed:
    roles:
      - name: blockcertify_user
        ensure: present
        login: true
        passwordSecret:
          name: blockcertify-db-credentials
        comment: "Blockcertify application db user"