apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: data
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  bootstrap:
    initdb:
      database:
      owner:
      secret:
        name:

  storage:
    size: 20Gi
    storageClass: longhorn

  postgresql:
    pg_hba:
      # Her kullanıcı sadece kendi db'sine bağlanabilir
      - "host blockcertify blockcertify_user all scram-sha-256"
      - "host \"diyet-app\" \"diyet-app-user\" all scram-sha-256"
      - "host blockcertify all all reject"
      - "host \"diyet-app\" all all reject"
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

  monitoring:
    enablePodMonitor: false

  # ---- Yeni uygulama eklerken sadece buraya ekleme yapacaksınız ----
  managed:
    roles:
      - name: blockcertify_user
        ensure: present
        login: true
        passwordSecret:
          name: blockcertify-db-credentials
        comment: "Blockcertify application db user"

      - name: diyet-app-user
        ensure: present
        login: true
        passwordSecret:
          name: diyet-app-db-credentials
        comment: "Diyet App application db user"