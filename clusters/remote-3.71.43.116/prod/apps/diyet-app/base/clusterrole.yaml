# ============================
# ClusterRole
# Diyet App - Basic permissions for application
# ============================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: diyet-app-role
  labels:
    app: diyet-app
rules:
  # Read-only access to required resources
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]