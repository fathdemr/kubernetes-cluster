# ============================
# ClusterRoleBinding
# Diyet App - Bind service account to role
# ============================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: diyet-app-rolebinding
  labels:
    app: diyet-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: diyet-app-role
subjects:
  - kind: ServiceAccount
    name: diyet-app
    namespace: diyet-app