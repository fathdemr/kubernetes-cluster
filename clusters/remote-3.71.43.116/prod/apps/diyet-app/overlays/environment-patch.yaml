apiVersion: apps/v1
kind: Deployment
metadata:
  name: diyet-app
spec:
  template:
    spec:
      containers:
        - name: diyet-app
          env:
            - name: SERVER_PORT
              value: "5076"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
            # PostgreSQL - internal cluster JDBC URL
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-rw.data.svc.cluster.local:5432/diyet-app"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: diyet-app-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diyet-app-secrets
                  key: db-password
            # Redis - internal cluster address
            - name: REDIS_HOST
              value: "redis.data.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            # Kafka - internal bootstrap
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            # Resend email service
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: diyet-app-secrets
                  key: resend-api-key
