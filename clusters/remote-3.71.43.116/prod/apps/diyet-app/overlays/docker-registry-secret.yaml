# ============================
# Docker Registry Secret
# Docker Hub credentials for private image access
# ============================
#
# Bu dosya git'e kaydedilmez — secret'ı cluster'a manuel olarak uygulayın:
#
#   kubectl create secret docker-registry docker-registry-secret \
#     --docker-server=https://index.docker.io/v1/ \
#     --docker-username=fathdemr \
#     --docker-password=<DOCKER_HUB_PAT> \
#     --namespace=diyet-app
#
# Ya da Sealed Secrets kullanın:
#   kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-secret
  namespace: diyet-app
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <BASE64_ENCODED_DOCKERCONFIG_JSON_BURAYA_GELECEK>