# ============================
# Ingress - Live Environment
# Diyet App Live Ingress with Let's Encrypt TLS
# Host: https://api.blockcertfiy.uk
# ============================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: diyet-app-live-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  labels:
    app: diyet-app
    environment: live
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.blockcertfiy.uk
      secretName: diyet-app-live-tls-secret
  rules:
    - host: api.blockcertfiy.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: diyet-app-svc
                port:
                  number: 80
