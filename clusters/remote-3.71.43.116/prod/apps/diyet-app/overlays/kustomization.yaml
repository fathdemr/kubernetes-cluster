# ============================
# Kustomization - Live Overlay
# Diyet App - Live Environment
# ============================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: diyet-app-live

resources:
  - ../base
  - namespace.yaml
  - ingress.yaml
  # docker-registry-secret.yaml git'e kaydedilmez — manuel uygulanır:
  # kubectl create secret docker-registry docker-registry-secret \
  #   --docker-server=https://index.docker.io/v1/ \
  #   --docker-username=fathdemr --docker-password=<PAT> -n diyet-app

# Disable hash suffix for generated secrets
generatorOptions:
  disableNameSuffixHash: true

# Target namespace
namespace: diyet-app

# NOTE: Image updates are managed by Flux ImageUpdateAutomation
# Flux scans repository and updates image tags automatically

patches:
  - path: environment-patch.yaml

# Labels for live environment (modern syntax)
labels:
  - pairs:
      environment: live
      tier: production
    includeSelectors: false
    includeTemplates: true