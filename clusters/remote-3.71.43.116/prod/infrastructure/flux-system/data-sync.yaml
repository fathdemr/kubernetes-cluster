apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: data-postgres
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/remote-3.71.43.116/prod/data/postgres
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
